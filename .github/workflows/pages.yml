name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs/site
          destination: ./_site

      - name: Verify installer bootstraps are published
        run: |
          test -f ./_site/install.sh
          test -f ./_site/install.ps1
          test -f ./_site/uninstall.sh
          test -f ./_site/uninstall.ps1

      - name: Make Pages artifact writable
        run: sudo chown -R "$(id -u):$(id -g)" ./_site

      - name: Normalize and verify duplicate Pages search metadata
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("_site/index.html")
          html = path.read_text(encoding="utf-8")
          canonical_pattern = re.compile(
              r'<link\b[^>]*\brel=["\']canonical["\'][^>]*>',
              flags=re.IGNORECASE,
          )
          generated = canonical_pattern.findall(html)
          if len(generated) != 1:
              raise SystemExit(f"Expected one generated canonical link, found {len(generated)}")
          html = canonical_pattern.sub(
              '<link rel="canonical" href="https://midterm.tlbx.ai/">',
              html,
          )
          path.write_text(html, encoding="utf-8")

          canonicals = canonical_pattern.findall(html)
          if len(canonicals) != 1:
              raise SystemExit(f"Expected one canonical link, found {len(canonicals)}")
          if 'href="https://midterm.tlbx.ai/"' not in canonicals[0]:
              raise SystemExit(f"Unexpected canonical: {canonicals[0]}")
          if not re.search(
              r'<meta\b[^>]*\bname=["\']robots["\'][^>]*\bcontent=["\']noindex, follow["\']',
              html,
              flags=re.IGNORECASE,
          ):
              raise SystemExit("Missing noindex, follow robots directive")

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
