name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  GIT_CONFIG_COUNT: '2'
  GIT_CONFIG_KEY_0: 'advice.detachedHead'
  GIT_CONFIG_VALUE_0: 'false'
  GIT_CONFIG_KEY_1: 'init.defaultBranch'
  GIT_CONFIG_VALUE_1: 'main'

jobs:

  # ── Create the draft release immediately so it exists before builds finish ──
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_dev: ${{ contains(github.ref_name, '-dev') }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Fetch tag annotation
        run: git fetch origin tag ${{ github.ref_name }} --no-tags --force

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE=$(git tag -l --format='%(contents:subject)' ${{ github.ref_name }})
          NOTES=$(git tag -l --format='%(contents:body)' ${{ github.ref_name }})
          PRERELEASE=""
          [[ "${{ github.ref_name }}" == *"-dev"* ]] && PRERELEASE="--prerelease"
          MAX_RELEASE_BODY=124000
          export NOTES MAX_RELEASE_BODY
          RELEASE_NOTES=$(python3 - <<'PY'
          import os
          import re
          import sys

          max_len = int(os.environ["MAX_RELEASE_BODY"])
          prefix = "## What's Changed\n"
          notes = os.environ.get("NOTES", "").rstrip("\n")

          if not notes:
              sys.stdout.write(prefix.rstrip("\n"))
              raise SystemExit

          full = prefix + notes
          if len(full) <= max_len:
              sys.stdout.write(full)
              raise SystemExit

          paragraphs = [part for part in re.split(r"\n{2,}", notes) if part]
          grouped_notice = "[Older release notes omitted to stay within GitHub's release size limit: {count} older sections omitted.]\n\n"

          if len(paragraphs) > 1:
              kept = []
              for idx in range(len(paragraphs) - 1, -1, -1):
                  candidate = [paragraphs[idx]] + kept
                  omitted = len(paragraphs) - len(candidate)
                  notice = grouped_notice.format(count=omitted) if omitted else ""
                  candidate_text = prefix + notice + "\n\n".join(candidate)
                  if len(candidate_text) <= max_len:
                      kept = candidate
                  elif kept:
                      break
                  else:
                      raise SystemExit("Latest release-note section exceeds the GitHub release body limit by itself.")

              omitted = len(paragraphs) - len(kept)
              notice = grouped_notice.format(count=omitted) if omitted else ""
              sys.stdout.write(prefix + notice + "\n\n".join(kept))
              raise SystemExit

          fallback_notice = "[Release notes truncated to stay within GitHub's release size limit.]\n\n"
          budget = max_len - len(prefix) - len(fallback_notice)
          if budget <= 0:
              raise SystemExit("Configured GitHub release body limit is too small.")

          sys.stdout.write(prefix + fallback_notice + notes[-budget:])
          PY
          )
          RELEASE_NOTES_FILE=$(mktemp)
          trap 'rm -f "$RELEASE_NOTES_FILE"' EXIT
          printf '%s' "$RELEASE_NOTES" > "$RELEASE_NOTES_FILE"
          if gh release view ${{ github.ref_name }} >/dev/null 2>&1; then
            gh release edit ${{ github.ref_name }} \
              $PRERELEASE \
              --title "$TITLE" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create ${{ github.ref_name }} \
              $PRERELEASE \
              --title "$TITLE" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi

  # ── Build frontend once (platform-agnostic JS/CSS/HTML) ──────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install npm packages
        working-directory: src/Ai.Tlbx.MidTerm
        run: npm ci --include=dev --prefer-offline --no-audit --no-fund

      - name: Build frontend
        shell: pwsh
        run: |
          $version = (Get-Content src/version.json | ConvertFrom-Json).web
          $isDev = "${{ github.ref_name }}".Contains("-dev")
          $buildArgs = @{ Publish = $true; Version = $version; SkipVerify = $true }
          if ($isDev) { $buildArgs.DevRelease = $true }
          ./src/Ai.Tlbx.MidTerm/frontend-build.ps1 @buildArgs

      - uses: actions/upload-artifact@v7
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/
          retention-days: 1

  frontend-tests:
    needs: prepare
    if: needs.prepare.outputs.is_dev != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install npm packages
        working-directory: src/Ai.Tlbx.MidTerm
        run: npm ci --include=dev --prefer-offline --no-audit --no-fund

      - name: Run frontend verification
        working-directory: src/Ai.Tlbx.MidTerm
        run: npm run verify

  dotnet-tests:
    needs: [prepare, frontend]
    if: needs.prepare.outputs.is_dev != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Run .NET test suite
        shell: pwsh
        run: ./scripts/run-dotnet-test-suite.ps1 -Configuration Release -WarnAsError

  # ── Build macOS ARM64 + Linux ARM64 for dev prereleases ────────────────────
  build-dev:
    needs: [prepare, frontend]
    if: needs.prepare.outputs.is_dev == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            ext: ''
          - os: macos-14
            rid: osx-x64
            ext: ''
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            ext: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost + mtagenthost + mttmux
        shell: pwsh
        run: ./scripts/publish-runtime-set.ps1 -Rid '${{ matrix.rid }}' -Configuration Release

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.rid }}
          cp src/Ai.Tlbx.MidTerm/bin/Release/net10.0/${{ matrix.rid }}/publish/mt${{ matrix.ext }} staging/${{ matrix.rid }}/
          cp src/version.json staging/${{ matrix.rid }}/
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            cp src/Ai.Tlbx.MidTerm.TmuxShim/bin/Release/net10.0/${{ matrix.rid }}/publish/mttmux.exe staging/${{ matrix.rid }}/
          fi
          if [[ -f src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mthost${{ matrix.ext }} ]]; then
            cp src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mthost${{ matrix.ext }} staging/${{ matrix.rid }}/
          else
            echo "mthost${{ matrix.ext }} not found for ${{ matrix.rid }}; continuing with web-only artifact set"
          fi
          cp src/Ai.Tlbx.MidTerm.AgentHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mtagenthost${{ matrix.ext }} staging/${{ matrix.rid }}/

          if [[ "${{ matrix.rid }}" == osx-* ]]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mt
            codesign --verify --strict staging/${{ matrix.rid }}/mt
            if [[ -f staging/${{ matrix.rid }}/mthost ]]; then
              codesign --force \
                --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
                --options runtime \
                --timestamp \
                staging/${{ matrix.rid }}/mthost
              codesign --verify --strict staging/${{ matrix.rid }}/mthost
            fi
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mtagenthost
            codesign --verify --strict staging/${{ matrix.rid }}/mtagenthost
          fi

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd staging/${{ matrix.rid }}
          files=(mt${{ matrix.ext }} mtagenthost${{ matrix.ext }})
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            files+=(mttmux.exe)
          fi
          if [[ -f mthost${{ matrix.ext }} ]]; then
            files+=(mthost${{ matrix.ext }})
          fi
          if command -v sha256sum &> /dev/null; then
            sha256sum "${files[@]}" > SHA256SUMS.txt
          else
            shasum -a 256 "${files[@]}" > SHA256SUMS.txt
          fi
          echo "=== ${{ matrix.rid }} ==="
          cat SHA256SUMS.txt

      - name: Notarize
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          files=(staging/${{ matrix.rid }}/mt staging/${{ matrix.rid }}/mtagenthost)
          if [[ -f staging/${{ matrix.rid }}/mthost ]]; then
            files+=(staging/${{ matrix.rid }}/mthost)
          fi
          zip -j "$RUNNER_TEMP/notarize.zip" "${files[@]}"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $rid = "${{ matrix.rid }}"
          $archive = "staging/mt-$rid.tar.gz"
          tar -cf - -C "staging/$rid" . | gzip -9 > $archive
          gh release upload "${{ github.ref_name }}" $archive --clobber

      - name: Clean up keychain
        if: startsWith(matrix.rid, 'osx-') && always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -e "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  # ── Build macOS + Linux for stable/public releases ─────────────────────────
  build:
    needs: [prepare, frontend, frontend-tests, dotnet-tests]
    if: needs.prepare.outputs.is_dev != 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            ext: ''
          - os: macos-14
            rid: osx-x64
            ext: ''
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            ext: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost + mtagenthost + mttmux
        shell: pwsh
        run: ./scripts/publish-runtime-set.ps1 -Rid '${{ matrix.rid }}' -Configuration Release

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.rid }}
          cp src/Ai.Tlbx.MidTerm/bin/Release/net10.0/${{ matrix.rid }}/publish/mt${{ matrix.ext }} staging/${{ matrix.rid }}/
          cp src/version.json staging/${{ matrix.rid }}/
          if [[ -f src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mthost${{ matrix.ext }} ]]; then
            cp src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mthost${{ matrix.ext }} staging/${{ matrix.rid }}/
          else
            echo "mthost${{ matrix.ext }} not found for ${{ matrix.rid }}; continuing with web-only artifact set"
          fi
          cp src/Ai.Tlbx.MidTerm.AgentHost/bin/Release/net10.0/${{ matrix.rid }}/publish/mtagenthost${{ matrix.ext }} staging/${{ matrix.rid }}/

          if [[ "${{ matrix.rid }}" == osx-* ]]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mt
            codesign --verify --strict staging/${{ matrix.rid }}/mt
            if [[ -f staging/${{ matrix.rid }}/mthost ]]; then
              codesign --force \
                --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
                --options runtime \
                --timestamp \
                staging/${{ matrix.rid }}/mthost
              codesign --verify --strict staging/${{ matrix.rid }}/mthost
            fi
            codesign --force \
              --sign "Developer ID Application: Johannes Schmidt (FK7G5C74WH)" \
              --options runtime \
              --timestamp \
              staging/${{ matrix.rid }}/mtagenthost
            codesign --verify --strict staging/${{ matrix.rid }}/mtagenthost
          fi

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd staging/${{ matrix.rid }}
          files=(mt${{ matrix.ext }} mtagenthost${{ matrix.ext }})
          if [[ -f mthost${{ matrix.ext }} ]]; then
            files+=(mthost${{ matrix.ext }})
          fi
          if command -v sha256sum &> /dev/null; then
            sha256sum "${files[@]}" > SHA256SUMS.txt
          else
            shasum -a 256 "${files[@]}" > SHA256SUMS.txt
          fi
          echo "=== ${{ matrix.rid }} ==="
          cat SHA256SUMS.txt

      - name: Notarize
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          files=(staging/${{ matrix.rid }}/mt staging/${{ matrix.rid }}/mtagenthost)
          if [[ -f staging/${{ matrix.rid }}/mthost ]]; then
            files+=(staging/${{ matrix.rid }}/mthost)
          fi
          zip -j "$RUNNER_TEMP/notarize.zip" "${files[@]}"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $rid = "${{ matrix.rid }}"
          $archive = "staging/mt-$rid.tar.gz"
          tar -cf - -C "staging/$rid" . | gzip -9 > $archive
          gh release upload "${{ github.ref_name }}" $archive --clobber

      - name: Clean up keychain
        if: startsWith(matrix.rid, 'osx-') && always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -e "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  # ── Build Windows: hosted runner for dev, self-hosted with signing for stable ─
  build-windows-dev:
    needs: [prepare, frontend]
    if: needs.prepare.outputs.is_dev == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
          - rid: win-x86
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost + mtagenthost + mttmux
        shell: pwsh
        run: ./scripts/publish-runtime-set.ps1 -Rid '${{ matrix.rid }}' -Configuration Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          New-Item -ItemType Directory -Force "staging/$rid" | Out-Null
          Copy-Item "src/Ai.Tlbx.MidTerm/bin/Release/net10.0/$rid/publish/mt.exe" "staging/$rid/"
          Copy-Item "src/Ai.Tlbx.MidTerm.TmuxShim/bin/Release/net10.0/$rid/publish/mttmux.exe" "staging/$rid/"
          Copy-Item src/version.json "staging/$rid/"
          $mthostPath = "src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/$rid/publish/mthost.exe"
          if (Test-Path $mthostPath) {
            Copy-Item $mthostPath "staging/$rid/"
          } else {
            Write-Host "mthost.exe not found for $rid; continuing with web-only artifact set"
          }
          Copy-Item "src/Ai.Tlbx.MidTerm.AgentHost/bin/Release/net10.0/$rid/publish/mtagenthost.exe" "staging/$rid/"

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $files = @("staging/$rid/mt.exe", "staging/$rid/mtagenthost.exe", "staging/$rid/mttmux.exe")
          if (Test-Path "staging/$rid/mthost.exe") {
            $files += "staging/$rid/mthost.exe"
          }
          $hashes = Get-ChildItem $files | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $hashes | Set-Content "staging/$rid/SHA256SUMS.txt"
          Write-Host "=== $rid ==="
          Get-Content "staging/$rid/SHA256SUMS.txt"

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $rid = '${{ matrix.rid }}'
          $archive = "staging/mt-$rid.zip"
          if (Get-Command 7z -ErrorAction SilentlyContinue) {
            7z a -tzip -mx=9 $archive "./staging/$rid/*" | Out-Null
          } else {
            Compress-Archive -Path "./staging/$rid/*" -DestinationPath $archive -Force
          }
          gh release upload "${{ github.ref_name }}" $archive --clobber

  build-windows:
    needs: [prepare, frontend, frontend-tests, dotnet-tests]
    if: needs.prepare.outputs.is_dev != 'true'
    permissions:
      contents: write
    runs-on: [self-hosted, windows, signing]

    steps:
      - uses: actions/checkout@v5

      - name: Verify local .NET SDK on self-hosted Windows runner
        shell: pwsh
        run: |
          $sdks = dotnet --list-sdks
          if (-not ($sdks | Select-String '^10\.0\.')) {
            throw "Required .NET 10 SDK not found on self-hosted runner."
          }
          dotnet --version

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend
          path: src/Ai.Tlbx.MidTerm/wwwroot/

      - name: Build mt + mthost + mtagenthost + mttmux
        shell: pwsh
        run: ./scripts/publish-runtime-set.ps1 -Rid 'win-x64' -Configuration Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging/win-x64 | Out-Null
          Copy-Item src/Ai.Tlbx.MidTerm/bin/Release/net10.0/win-x64/publish/mt.exe staging/win-x64/
          Copy-Item src/Ai.Tlbx.MidTerm.TmuxShim/bin/Release/net10.0/win-x64/publish/mttmux.exe staging/win-x64/
          Copy-Item src/version.json staging/win-x64/
          $mthostPath = 'src/Ai.Tlbx.MidTerm.TtyHost/bin/Release/net10.0/win-x64/publish/mthost.exe'
          if (Test-Path $mthostPath) {
            Copy-Item $mthostPath staging/win-x64/
          } else {
            Write-Host 'mthost.exe not found for win-x64; continuing with web-only artifact set'
          }
          Copy-Item src/Ai.Tlbx.MidTerm.AgentHost/bin/Release/net10.0/win-x64/publish/mtagenthost.exe staging/win-x64/

      - name: Require stable Windows signing inputs
        shell: pwsh
        run: |
          if (-not (Test-Path 'staging/win-x64/mt.exe')) {
            throw 'mt.exe must be present before stable Windows signing.'
          }
          if (-not (Test-Path 'staging/win-x64/mtagenthost.exe')) {
            throw 'mtagenthost.exe must be present before stable Windows signing.'
          }
          if (-not (Test-Path 'staging/win-x64/mttmux.exe')) {
            throw 'mttmux.exe must be present before stable Windows signing.'
          }

      - name: Sign Windows binaries (mt.exe, mthost.exe, mtagenthost.exe, mttmux.exe)
        shell: pwsh
        run: ./scripts/sign-windows-binaries.ps1 -StagingPath staging/win-x64

      - name: Verify stable Windows Authenticode signatures
        shell: pwsh
        run: |
          $files = @('staging/win-x64/mt.exe', 'staging/win-x64/mtagenthost.exe', 'staging/win-x64/mttmux.exe')
          if (Test-Path 'staging/win-x64/mthost.exe') {
            $files += 'staging/win-x64/mthost.exe'
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file
            if ($signature.Status -ne 'Valid') {
              throw "Authenticode verification failed for ${file}: $($signature.StatusMessage)"
            }
          }

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $files = @('staging/win-x64/mt.exe', 'staging/win-x64/mtagenthost.exe', 'staging/win-x64/mttmux.exe')
          if (Test-Path 'staging/win-x64/mthost.exe') {
            $files += 'staging/win-x64/mthost.exe'
          }
          $hashes = Get-ChildItem $files | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $hashes | Set-Content staging/win-x64/SHA256SUMS.txt
          Write-Host "=== win-x64 ==="
          Get-Content staging/win-x64/SHA256SUMS.txt

      - name: Sign version.json
        shell: pwsh
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: ./scripts/sign-release.ps1 -ArtifactsPath staging

      - name: Package and upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $archive = "staging/mt-win-x64.zip"
          if (Get-Command 7z -ErrorAction SilentlyContinue) {
            7z a -tzip -mx=9 $archive "./staging/win-x64/*" | Out-Null
          } else {
            Compress-Archive -Path "./staging/win-x64/*" -DestinationPath $archive -Force
          }
          gh release upload "${{ github.ref_name }}" $archive --clobber

  publish-npm:
    needs: [prepare, build, build-windows]
    if: needs.prepare.outputs.is_dev != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          node --version
          npm --version

      - name: Sync launcher version
        run: node ./scripts/sync-npx-launcher-version.mjs

      - name: Publish npm launcher
        shell: bash
        working-directory: src/npx-launcher
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@tlbx-ai/midterm@$VERSION" version >/dev/null 2>&1; then
            echo "@tlbx-ai/midterm@$VERSION is already published, skipping"
            exit 0
          fi
          npm publish --access public --provenance --tag latest

  prune-artifacts:
    needs: [prepare, build, build-windows, publish-npm]
    if: needs.prepare.outputs.is_dev != 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Prune old workflow artifacts outside retained release lines
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/prune-release-artifacts.ps1 `
            -Repository "${{ github.repository }}" `
            -CurrentTag "${{ github.ref_name }}"
