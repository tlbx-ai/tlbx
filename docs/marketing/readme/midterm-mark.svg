<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MidTerm logo</title>
  <desc id="desc">Two bright terminal rails forming a gateway around a blue signal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#030508"/><stop offset="1" stop-color="#0d1727"/></linearGradient>
    <radialGradient id="halo"><stop stop-color="#80b6f2" stop-opacity="0.38"/><stop offset="1" stop-color="#80b6f2" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#80b6f2" stroke-opacity="0.06"/></pattern>
  </defs>
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>
  <rect width="512" height="512" rx="92" fill="url(#grid)"/>
  <circle cx="256" cy="276" r="225" fill="url(#halo)"/>
  <path d="M174 86h63L91 433H32zM275 86h63l146 347h-59z" fill="#fdfefc"/>
  <circle cx="254" cy="292" r="20" fill="#80b6f2" filter="url(#glow)"/>
  <rect x="1" y="1" width="510" height="510" rx="91" fill="none" stroke="#80b6f2" stroke-opacity="0.22" stroke-width="2"/>
</svg>
