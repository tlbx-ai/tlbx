<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">One control room for every AI coding agent</title>
  <desc id="desc">Codex, Claude Code, Grok and any terminal-native agent run in persistent local sessions while MidTerm keeps their terminal, files, git state, browser proof and mobile controls visible together.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#040609"/><stop offset="1" stop-color="#0a111e"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#111a2b"/><stop offset="1" stop-color="#090e18"/></linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050709"/><stop offset="1" stop-color="#080d14"/></linearGradient>
    <radialGradient id="halo"><stop stop-color="#80b6f2" stop-opacity="0.26"/><stop offset="1" stop-color="#80b6f2" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M50 0H0V50" fill="none" stroke="#80b6f2" stroke-opacity="0.045"/></pattern>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="800" cy="440" r="460" fill="url(#halo)"/>
  <rect x="1" y="1" width="1598" height="898" rx="27" fill="none" stroke="#80b6f2" stroke-opacity="0.18" stroke-width="2"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="90" y="86" fill="#80b6f2" font-size="17" font-weight="700" letter-spacing="3">THE FLEET</text>
    <text x="90" y="126" fill="#f7faff" font-size="31" font-weight="700">Every agent stays visible.</text>
    <text x="1510" y="86" fill="#7f8ca2" font-size="15" text-anchor="end">LOCAL MACHINE · LIVE SESSIONS · HUMAN IN CONTROL</text>

    <!-- Agent session rail -->
    <g transform="translate(72 180)">
      <rect width="338" height="566" rx="20" fill="url(#panel)" stroke="#27344b"/>
      <path d="M338 64H0" stroke="#27344b"/>
      <circle cx="26" cy="32" r="5" fill="#77f2a1" filter="url(#glow)"/>
      <text x="45" y="38" fill="#dbe5f5" font-size="14" font-weight="700">4 ACTIVE SESSIONS</text>

      <g transform="translate(18 84)">
        <rect width="302" height="91" rx="12" fill="#17243b" stroke="#80b6f2" stroke-opacity="0.52"/>
        <path d="M0 12Q0 0 12 0H302V91H12Q0 91 0 79Z" fill="none" stroke="#80b6f2" stroke-width="3"/>
        <circle cx="25" cy="30" r="7" fill="#77f2a1"/>
        <text x="45" y="35" fill="#f7faff" font-size="18" font-weight="700">Codex</text>
        <text x="45" y="61" fill="#9aa8bd" font-size="13">auth-refactor · running</text>
        <text x="277" y="35" fill="#80b6f2" font-size="12" text-anchor="end">LIVE</text>
      </g>
      <g transform="translate(18 189)">
        <rect width="302" height="91" rx="12" fill="#101827" stroke="#27344b"/>
        <circle cx="25" cy="30" r="7" fill="#ffd479"/>
        <text x="45" y="35" fill="#f7faff" font-size="18" font-weight="700">Claude Code</text>
        <text x="45" y="61" fill="#9aa8bd" font-size="13">api-review · needs input</text>
        <text x="277" y="35" fill="#ffd479" font-size="12" text-anchor="end">WAIT</text>
      </g>
      <g transform="translate(18 294)">
        <rect width="302" height="91" rx="12" fill="#101827" stroke="#27344b"/>
        <circle cx="25" cy="30" r="7" fill="#c997ff"/>
        <text x="45" y="35" fill="#f7faff" font-size="18" font-weight="700">Grok</text>
        <text x="45" y="61" fill="#9aa8bd" font-size="13">perf-audit · thinking</text>
        <text x="277" y="35" fill="#c997ff" font-size="12" text-anchor="end">BUSY</text>
      </g>
      <g transform="translate(18 399)">
        <rect width="302" height="91" rx="12" fill="#101827" stroke="#27344b"/>
        <circle cx="25" cy="30" r="7" fill="#80b6f2"/>
        <text x="45" y="35" fill="#f7faff" font-size="18" font-weight="700">Any CLI agent</text>
        <text x="45" y="61" fill="#9aa8bd" font-size="13">your tool · real PTY</text>
        <text x="277" y="35" fill="#80b6f2" font-size="12" text-anchor="end">OPEN</text>
      </g>
    </g>

    <!-- Main MidTerm workspace -->
    <g transform="translate(446 180)">
      <rect width="790" height="566" rx="20" fill="#080c13" stroke="#34435d" stroke-width="1.5"/>
      <rect width="790" height="58" rx="20" fill="#101827"/>
      <rect y="40" width="790" height="18" fill="#101827"/>
      <circle cx="27" cy="29" r="6" fill="#80b6f2"/>
      <path d="M42 17h10L38 42H28zM58 17h10l14 25H72z" fill="#f7faff"/>
      <text x="99" y="36" fill="#f7faff" font-size="17" font-weight="700">MidTerm</text>
      <text x="210" y="36" fill="#80b6f2" font-size="14" font-weight="700">TERMINAL</text>
      <text x="319" y="36" fill="#8997ad" font-size="14">FILES</text>
      <text x="385" y="36" fill="#8997ad" font-size="14">GIT</text>
      <text x="438" y="36" fill="#8997ad" font-size="14">BROWSER</text>
      <circle cx="748" cy="29" r="6" fill="#77f2a1"/>
      <text x="734" y="34" fill="#9aa8bd" font-size="11" text-anchor="end">CONNECTED</text>

      <rect x="20" y="78" width="478" height="390" rx="12" fill="url(#terminal)" stroke="#202b3d"/>
      <text x="42" y="116" fill="#77f2a1" font-size="15">✓ tests passed</text>
      <text x="42" y="151" fill="#f7faff" font-size="15">agent&gt; opening the app in Dev Browser</text>
      <text x="42" y="186" fill="#80b6f2" font-size="15">browser&gt; 200 · console clean · 390×844</text>
      <text x="42" y="221" fill="#f7faff" font-size="15">agent&gt; found overflow at mobile width</text>
      <text x="42" y="256" fill="#ffd479" font-size="15">edit&gt; src/layout/mobile.css +8 −3</text>
      <text x="42" y="291" fill="#77f2a1" font-size="15">✓ browser proof captured</text>
      <path d="M42 330h240" stroke="#26334a" stroke-width="10" stroke-linecap="round"/>
      <path d="M42 330h171" stroke="#80b6f2" stroke-width="10" stroke-linecap="round"/>
      <text x="42" y="371" fill="#9aa8bd" font-size="13">The agent works. MidTerm keeps the evidence.</text>
      <rect x="42" y="401" width="149" height="38" rx="8" fill="#17243b" stroke="#80b6f2" stroke-opacity="0.55"/>
      <text x="116" y="426" fill="#f7faff" font-size="13" text-anchor="middle" font-weight="700">REVIEW DIFF</text>

      <rect x="516" y="78" width="254" height="390" rx="12" fill="#0d1727" stroke="#27354c"/>
      <rect x="530" y="93" width="226" height="34" rx="7" fill="#172238"/>
      <circle cx="546" cy="110" r="4" fill="#77f2a1"/>
      <text x="559" y="115" fill="#aebad0" font-size="11">localhost:5173</text>
      <rect x="530" y="142" width="226" height="207" rx="8" fill="#101c30"/>
      <path d="M549 166h8l-18 43h-7zM565 166h8l18 43h-7z" fill="#f7faff"/>
      <circle cx="562" cy="193" r="3" fill="#80b6f2"/>
      <text x="549" y="246" fill="#f7faff" font-size="18" font-weight="700">App verified.</text>
      <text x="549" y="273" fill="#9aa8bd" font-size="11">DOM · logs · screenshot</text>
      <rect x="549" y="295" width="134" height="28" rx="6" fill="#80b6f2"/>
      <text x="616" y="314" fill="#06101e" font-size="11" text-anchor="middle" font-weight="700">OPEN PROOF</text>
      <text x="530" y="382" fill="#80b6f2" font-size="11" font-weight="700">GIT</text>
      <text x="559" y="382" fill="#77f2a1" font-size="11">clean after commit</text>
      <text x="530" y="411" fill="#80b6f2" font-size="11" font-weight="700">FILES</text>
      <text x="575" y="411" fill="#d7e0ef" font-size="11">3 changed</text>
      <text x="530" y="440" fill="#80b6f2" font-size="11" font-weight="700">LOGS</text>
      <text x="570" y="440" fill="#d7e0ef" font-size="11">0 errors</text>

      <rect x="20" y="486" width="750" height="60" rx="12" fill="#0f1726" stroke="#27344b"/>
      <text x="43" y="522" fill="#8e9bb0" font-size="14">Tell the agent what matters next…</text>
      <rect x="695" y="499" width="54" height="34" rx="8" fill="#80b6f2"/>
      <path d="M716 508l17 8-17 8z" fill="#07101d"/>
    </g>

    <!-- Anywhere / human control -->
    <g transform="translate(1272 222)">
      <text x="112" y="-20" fill="#80b6f2" font-size="14" text-anchor="middle" font-weight="700" letter-spacing="2">ANY BROWSER</text>
      <rect width="224" height="432" rx="34" fill="#080b12" stroke="#617392" stroke-width="2"/>
      <rect x="12" y="12" width="200" height="408" rx="25" fill="#0d1523"/>
      <rect x="77" y="22" width="70" height="7" rx="3.5" fill="#2a3548"/>
      <path d="M30 50h9l-12 25h-8zM44 50h9l12 25h-8z" fill="#f7faff"/>
      <circle cx="42" cy="66" r="3" fill="#80b6f2"/>
      <text x="77" y="68" fill="#f7faff" font-size="13" font-weight="700">MidTerm</text>
      <rect x="25" y="94" width="174" height="69" rx="10" fill="#17243b" stroke="#80b6f2" stroke-opacity="0.55"/>
      <circle cx="43" cy="119" r="6" fill="#ffd479"/>
      <text x="58" y="122" fill="#f7faff" font-size="13" font-weight="700">Needs input</text>
      <text x="43" y="146" fill="#9aa8bd" font-size="10">Approve database migration?</text>
      <rect x="25" y="178" width="174" height="116" rx="10" fill="#080c12" stroke="#26334a"/>
      <text x="40" y="205" fill="#77f2a1" font-size="10">✓ plan reviewed</text>
      <text x="40" y="228" fill="#f7faff" font-size="10">$ dotnet test</text>
      <text x="40" y="251" fill="#80b6f2" font-size="10">Running 214 tests…</text>
      <path d="M40 273h108" stroke="#80b6f2" stroke-width="4" stroke-linecap="round"/>
      <rect x="25" y="310" width="82" height="39" rx="8" fill="#80b6f2"/>
      <text x="66" y="335" fill="#07101d" font-size="11" font-weight="700" text-anchor="middle">APPROVE</text>
      <rect x="117" y="310" width="82" height="39" rx="8" fill="#182236"/>
      <text x="158" y="335" fill="#dbe5f5" font-size="11" font-weight="700" text-anchor="middle">STEER</text>
      <text x="112" y="385" fill="#8e9bb0" font-size="10" text-anchor="middle">desktop · tablet · phone</text>
    </g>

    <!-- Signal connectors -->
    <path d="M410 352H446" stroke="#80b6f2" stroke-width="3" stroke-dasharray="6 8"/>
    <path d="M1236 440h36" stroke="#80b6f2" stroke-width="3" stroke-dasharray="6 8"/>
    <circle cx="428" cy="352" r="5" fill="#80b6f2" filter="url(#glow)"/>
    <circle cx="1254" cy="440" r="5" fill="#80b6f2" filter="url(#glow)"/>

    <text x="800" y="823" fill="#f7faff" font-size="27" text-anchor="middle" font-weight="700">Launch agents. Watch the fleet. Inspect the proof. Intervene when it matters.</text>
    <text x="800" y="855" fill="#8e9bb0" font-size="15" text-anchor="middle">The model can change. Your control room stays.</text>
  </g>
</svg>
