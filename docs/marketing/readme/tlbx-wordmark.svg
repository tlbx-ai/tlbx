<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">tlbx — terminal browser multiplexer, say “toolbox”</title>
  <desc id="desc">The tlbx toolbox mark beside the name reading: tlbx stands for terminal browser multiplexer and is spoken like toolbox. Run coding agents on the machines that own the work and steer them from any browser.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030508"/>
      <stop offset="0.55" stop-color="#080d17"/>
      <stop offset="1" stop-color="#0c1423"/>
    </linearGradient>
    <radialGradient id="signal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#bfe0ff" stop-opacity="0.95"/>
      <stop offset="0.28" stop-color="#80b6f2" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#80b6f2" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#80b6f2" stroke-opacity="0.055"/>
    </pattern>
    <clipPath id="frame"><rect width="1600" height="520" rx="30"/></clipPath>
    <symbol id="tlbxToolboxMark" viewBox="0 0 400 400">
      <g fill="none" stroke="#f7f8fb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 98 265 7 385 69 385 299 132 390 12 328Z"/>
        <path d="M12 98 132 160 385 69M12 140 132 202 385 111M132 160V390M132 202 266.09 277.97 385 111"/>
      </g>
      <path d="M240.79 141.87Q266.09 108.77 291.39 123.67Q266.09 156.77 240.79 141.87Z" fill="#f7f8fb"/>
      <circle cx="266.09" cy="132.77" r="9.5" fill="#05070b"/>
      <circle cx="266.09" cy="132.77" r="4.6" fill="#69b7ff" filter="url(#dotGlow)"/>
      <path d="M94.6 241.077C84.6 224.91 65.6 213.093 51.6 218.86C38.6 223.143 41.6 238.693 53.6 248.893C66.6 263.61 85.6 269.427 94.6 261.077V251.077L76.6 241.777" fill="none" stroke="#f7f8fb" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1600" height="520" fill="url(#bg)"/>
    <rect width="1600" height="520" fill="url(#grid)"/>
    <circle cx="356" cy="260" r="270" fill="url(#signal)" opacity="0.32"/>
    <circle cx="1420" cy="-10" r="420" fill="url(#signal)" opacity="0.12"/>
    <path d="M0 440H1600" stroke="#80b6f2" stroke-opacity="0.16"/>
    <path d="M1130 440h470" stroke="#80b6f2" stroke-opacity="0.55"/>

    <use href="#tlbxToolboxMark" x="92" y="64" width="440" height="440" aria-label="tlbx toolbox logo"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
      <text x="650" y="242" fill="#f7faff" font-size="132" font-weight="700" letter-spacing="10">tlbx</text>
      <text x="658" y="300" font-size="30" font-weight="700" letter-spacing="2" fill="#8fa0b8" xml:space="preserve"><tspan fill="#69b7ff">t</tspan><tspan>ermina</tspan><tspan fill="#69b7ff">l</tspan><tspan> </tspan><tspan fill="#69b7ff">b</tspan><tspan>rowser multiple</tspan><tspan fill="#69b7ff">x</tspan><tspan>er</tspan><tspan fill="#6f7582">  ·  say “toolbox”</tspan></text>
      <text x="658" y="360" fill="#80b6f2" font-size="26" font-weight="700" letter-spacing="4">YOUR AGENTS. YOUR MACHINES. ANY BROWSER.</text>
    </g>

    <g transform="translate(658 421)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="1.5">
      <circle cx="7" cy="-5" r="6" fill="#77f2a1"/>
      <text x="25" y="0" fill="#9ca9be">ANY CLI AGENT</text>
      <circle cx="190" cy="-5" r="6" fill="#80b6f2"/>
      <text x="208" y="0" fill="#9ca9be">MULTIPLE AT ONCE</text>
      <circle cx="400" cy="-5" r="6" fill="#c997ff"/>
      <text x="418" y="0" fill="#9ca9be">SESSIONS PERSIST</text>
    </g>
  </g>
  <rect x="0.75" y="0.75" width="1598.5" height="518.5" rx="29.25" fill="none" stroke="#80b6f2" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>
