<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="title desc">
  <title id="title">Your coding agents run where the work lives</title>
  <desc id="desc">A browser used from anywhere steers named coding agents across independent tlbx instances on a home workstation, office laptop and another machine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#040609"/><stop offset="1" stop-color="#0b1321"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#121c2e"/><stop offset="1" stop-color="#0a101b"/></linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#80b6f2" stop-opacity="0.15"/><stop offset="0.5" stop-color="#80b6f2" stop-opacity="0.95"/><stop offset="1" stop-color="#80b6f2" stop-opacity="0.15"/></linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#80b6f2" stroke-opacity="0.045"/></pattern>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1600" height="680" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="680" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="678" rx="27" fill="none" stroke="#80b6f2" stroke-opacity="0.2" stroke-width="2"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="800" y="62" fill="#80b6f2" font-size="17" text-anchor="middle" font-weight="700" letter-spacing="3">YOUR AGENTS · YOUR MACHINES · ANY BROWSER</text>
    <text x="800" y="105" fill="#f7faff" font-size="33" text-anchor="middle" font-weight="700">Agents run where the work lives.</text>

    <g transform="translate(80 160)">
      <rect width="500" height="390" rx="20" fill="url(#panel)" stroke="#405472" stroke-width="2"/>
      <rect width="500" height="66" rx="20" fill="#141e30"/>
      <rect y="50" width="500" height="16" fill="#141e30"/>
      <circle cx="24" cy="24" r="6" fill="#ff6b6b"/>
      <circle cx="46" cy="24" r="6" fill="#ffd479"/>
      <circle cx="68" cy="24" r="6" fill="#77f2a1"/>
      <text x="100" y="30" fill="#f7faff" font-size="14" font-weight="700">YOU · ANYWHERE</text>
      <text x="468" y="30" fill="#80b6f2" font-size="11" text-anchor="end">BROWSER</text>

      <g transform="translate(22 82)">
        <rect width="134" height="48" rx="9" fill="#101827" stroke="#26344a"/>
        <text x="18" y="29" fill="#9aa8bd" font-size="12">Issues</text>
        <rect x="144" width="144" height="48" rx="9" fill="#17243b" stroke="#80b6f2"/>
        <circle cx="162" cy="24" r="4" fill="#77f2a1"/>
        <text x="174" y="29" fill="#f7faff" font-size="12" font-weight="700">Home PC</text>
        <rect x="298" width="158" height="48" rx="9" fill="#17182b" stroke="#c997ff" stroke-opacity="0.55"/>
        <circle cx="316" cy="24" r="4" fill="#c997ff"/>
        <text x="328" y="29" fill="#d7e0ef" font-size="12">Work laptop</text>
      </g>

      <rect x="22" y="150" width="456" height="176" rx="12" fill="#05080d" stroke="#293750"/>
      <text x="46" y="180" fill="#80b6f2" font-size="11" font-weight="700">tlbx · HOME WORKSTATION</text>
      <text x="46" y="221" fill="#77f2a1" font-size="14">● Codex + Grok Build running</text>
      <text x="46" y="256" fill="#f7faff" font-size="14">Q:/repos/product · dev server :5173</text>
      <text x="46" y="291" fill="#ffd479" font-size="14">tests 214/214 · git clean</text>
      <text x="46" y="361" fill="#9aa8bd" font-size="12">Baltic coast · train · kitchen · phone</text>
    </g>

    <path d="M580 355H715" fill="none" stroke="url(#beam)" stroke-width="4"/>
    <circle cx="715" cy="355" r="7" fill="#80b6f2" filter="url(#glow)"/>
    <path d="M715 355C770 355 770 230 830 230M715 355H830M715 355C770 355 770 480 830 480" fill="none" stroke="#80b6f2" stroke-opacity="0.7" stroke-width="2"/>
    <text x="705" y="330" fill="#8f9caf" font-size="11" text-anchor="middle">HTTPS · YOUR NETWORK</text>

    <g transform="translate(830 162)">
      <rect width="690" height="138" rx="16" fill="url(#panel)" stroke="#36506f" stroke-width="2"/>
      <circle cx="32" cy="36" r="7" fill="#77f2a1" filter="url(#glow)"/>
      <text x="56" y="42" fill="#f7faff" font-size="18" font-weight="700">HOME WORKSTATION</text>
      <text x="650" y="40" fill="#77f2a1" font-size="11" text-anchor="end">tlbx ONLINE</text>
      <text x="32" y="82" fill="#80b6f2" font-size="13">Codex · Grok Build · product repo · localhost app</text>
      <text x="32" y="112" fill="#9aa8bd" font-size="12">Processes and session state remain here</text>
    </g>

    <g transform="translate(830 322)">
      <rect width="690" height="138" rx="16" fill="url(#panel)" stroke="#5c4677" stroke-width="2"/>
      <circle cx="32" cy="36" r="7" fill="#c997ff" filter="url(#glow)"/>
      <text x="56" y="42" fill="#f7faff" font-size="18" font-weight="700">OFFICE LAPTOP</text>
      <text x="650" y="40" fill="#c997ff" font-size="11" text-anchor="end">SEPARATE INSTANCE</text>
      <text x="32" y="82" fill="#c997ff" font-size="13">Claude Code · OpenCode · internal repo · tools</text>
      <text x="32" y="112" fill="#9aa8bd" font-size="12">Independent host, next browser tab</text>
    </g>

    <g transform="translate(830 482)">
      <rect width="690" height="108" rx="16" fill="url(#panel)" stroke="#3f4c61" stroke-width="2"/>
      <circle cx="32" cy="34" r="7" fill="#80b6f2"/>
      <text x="56" y="40" fill="#f7faff" font-size="18" font-weight="700">ANOTHER MACHINE</text>
      <text x="650" y="38" fill="#80b6f2" font-size="11" text-anchor="end">ANOTHER TAB</text>
      <text x="32" y="78" fill="#9aa8bd" font-size="12">Antigravity · Copilot CLI · server · wherever the work lives</text>
    </g>

    <text x="800" y="642" fill="#f7faff" font-size="23" text-anchor="middle" font-weight="700">Each host keeps its agents and work. You steer them from anywhere.</text>
  </g>
</svg>
