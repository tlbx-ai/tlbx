<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="690" viewBox="0 0 1600 690" role="img" aria-labelledby="title desc">
  <title id="title">The complete AI agent proof loop</title>
  <desc id="desc">MidTerm keeps prompting, building, browser validation, inspection and human steering in one continuous loop around the agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#05070b"/><stop offset="1" stop-color="#0a1220"/></linearGradient>
    <radialGradient id="halo"><stop stop-color="#80b6f2" stop-opacity="0.3"/><stop offset="1" stop-color="#80b6f2" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#80b6f2"/></marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#80b6f2" stroke-opacity="0.045"/></pattern>
  </defs>
  <rect width="1600" height="690" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="690" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="688" rx="27" fill="none" stroke="#80b6f2" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="800" cy="370" r="310" fill="url(#halo)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="800" y="72" fill="#80b6f2" font-size="17" text-anchor="middle" font-weight="700" letter-spacing="3">THE DIFFERENCE IS THE LOOP</text>
    <text x="800" y="116" fill="#f7faff" font-size="34" text-anchor="middle" font-weight="700">An agent is only useful when the work is proven.</text>

    <!-- Loop -->
    <path d="M421 370C421 191 591 146 782 146" fill="none" stroke="#80b6f2" stroke-width="3" stroke-opacity="0.7" marker-end="url(#arrow)"/>
    <path d="M818 146c191 0 361 45 361 224" fill="none" stroke="#80b6f2" stroke-width="3" stroke-opacity="0.7" marker-end="url(#arrow)"/>
    <path d="M1179 406c0 178-170 223-361 223" fill="none" stroke="#80b6f2" stroke-width="3" stroke-opacity="0.7" marker-end="url(#arrow)"/>
    <path d="M782 629c-191 0-361-45-361-223" fill="none" stroke="#80b6f2" stroke-width="3" stroke-opacity="0.7" marker-end="url(#arrow)"/>

    <!-- Center logo and thesis -->
    <g transform="translate(710 278)">
      <circle cx="90" cy="85" r="85" fill="#0b1422" stroke="#80b6f2" stroke-opacity="0.32"/>
      <path d="M56 30h20L34 138H15zM100 30h20l45 108h-20z" fill="#fdfefc"/>
      <circle cx="89" cy="95" r="7" fill="#80b6f2" filter="url(#glow)"/>
      <text x="90" y="158" fill="#80b6f2" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="2">MIDTERM</text>
    </g>

    <!-- Nodes -->
    <g transform="translate(146 274)">
      <rect width="280" height="150" rx="18" fill="#101928" stroke="#2c3a52"/>
      <circle cx="40" cy="42" r="16" fill="#172a45"/>
      <path d="M33 42h14M40 35v14" stroke="#80b6f2" stroke-width="2"/>
      <text x="70" y="49" fill="#f7faff" font-size="20" font-weight="700">PROMPT</text>
      <text x="30" y="86" fill="#9aa8bd" font-size="14">Route the next job to the</text>
      <text x="30" y="109" fill="#9aa8bd" font-size="14">right live agent session.</text>
      <text x="30" y="134" fill="#80b6f2" font-size="12" font-weight="700">COMMAND BAY · WAKEUPS</text>
    </g>
    <g transform="translate(660 128)">
      <rect width="280" height="150" rx="18" fill="#101928" stroke="#2c3a52"/>
      <circle cx="40" cy="42" r="16" fill="#163226"/>
      <path d="M32 43l6 6 11-14" fill="none" stroke="#77f2a1" stroke-width="2.5"/>
      <text x="70" y="49" fill="#f7faff" font-size="20" font-weight="700">BUILD</text>
      <text x="30" y="86" fill="#9aa8bd" font-size="14">Real PTYs, local tools, repos,</text>
      <text x="30" y="109" fill="#9aa8bd" font-size="14">credentials and hardware.</text>
      <text x="30" y="134" fill="#77f2a1" font-size="12" font-weight="700">TERMINAL · FILES · GIT</text>
    </g>
    <g transform="translate(1174 274)">
      <rect width="280" height="150" rx="18" fill="#101928" stroke="#2c3a52"/>
      <circle cx="40" cy="42" r="16" fill="#2e2440"/>
      <rect x="31" y="34" width="18" height="15" rx="2" fill="none" stroke="#c997ff" stroke-width="2"/>
      <path d="M31 39h18" stroke="#c997ff" stroke-width="2"/>
      <text x="70" y="49" fill="#f7faff" font-size="20" font-weight="700">VALIDATE</text>
      <text x="30" y="86" fill="#9aa8bd" font-size="14">Open the app. Inspect DOM, logs,</text>
      <text x="30" y="109" fill="#9aa8bd" font-size="14">screenshots and mobile layout.</text>
      <text x="30" y="134" fill="#c997ff" font-size="12" font-weight="700">DEV BROWSER · MOBILE TEST</text>
    </g>
    <g transform="translate(660 456)">
      <rect width="280" height="150" rx="18" fill="#101928" stroke="#2c3a52"/>
      <circle cx="40" cy="42" r="16" fill="#3b2e18"/>
      <path d="M33 42l5 5 10-11" fill="none" stroke="#ffd479" stroke-width="2.5"/>
      <text x="70" y="49" fill="#f7faff" font-size="20" font-weight="700">STEER</text>
      <text x="30" y="86" fill="#9aa8bd" font-size="14">Review, approve, interrupt or</text>
      <text x="30" y="109" fill="#9aa8bd" font-size="14">redirect—from any browser.</text>
      <text x="30" y="134" fill="#ffd479" font-size="12" font-weight="700">DESKTOP · TABLET · PHONE</text>
    </g>

    <text x="800" y="663" fill="#8996aa" font-size="14" text-anchor="middle">No handoff between five apps. No lost terminal. No “done” without evidence.</text>
  </g>
</svg>
