<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Login - tlbx</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=__MIDTERM_ASSET_VERSION__" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=__MIDTERM_ASSET_VERSION__" />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/android-chrome-192x192.png?v=__MIDTERM_ASSET_VERSION__"
    />
    <meta name="theme-color" content="#0D0E14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="tlbx" />

    <link rel="stylesheet" href="/css/app.css?v=__MIDTERM_ASSET_VERSION__" />
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo-wrapper">
                    <img
                      src="/img/tlbx-toolbox.svg?v=__MIDTERM_ASSET_VERSION__"
                      alt=""
                      class="login-logo"
                    />
                </div>
                <h1 class="tlbx-wordmark">tlbx</h1>
                <p class="login-tagline" data-i18n="auth.terminalMultiplexer">Terminal Multiplexer</p>
            </div>

            <form id="login-form" class="login-form" method="post">
                <input type="text" name="username" autocomplete="username" tabindex="-1" style="position:absolute;left:-9999px;opacity:0" aria-hidden="true" />
                <div class="form-group">
                    <label for="password" data-i18n="auth.password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" autofocus />
                </div>

                <div id="error-message" class="error-message hidden"></div>

                <button type="submit" id="login-btn" class="login-btn" data-i18n="auth.login">Login</button>
            </form>

            <div class="login-version" id="login-version"></div>
        </div>

        <div id="cert-info" class="cert-info hidden">
            <div class="cert-info-header">
                <span class="cert-info-title" data-i18n="auth.certFingerprint">Certificate Fingerprint</span>
                <button type="button" id="cert-hide-btn" class="cert-hide-btn" data-i18n-title="auth.certHidePanel" title="Hide this panel">×</button>
            </div>
            <div class="cert-fingerprint" id="cert-fingerprint"></div>
            <div class="cert-dates">
                <span id="cert-valid-from"></span>
                <span id="cert-valid-until"></span>
            </div>
            <div class="cert-hint">
                <span data-i18n="auth.certVerifyHint">Verify this matches across devices. See Settings → Security for details.</span>
            </div>
        </div>
    </div>

    <!-- Insider info: visible only when selecting all text (Ctrl+A) -->
    <div class="login-insider" id="login-insider" aria-hidden="true"></div>

    <script src="/js/terminal.min.js?v=__MIDTERM_ASSET_VERSION__"></script>
</body>
</html>
